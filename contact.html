<!DOCTYPE html>
<html lang="en" data-root=".">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact — Havlek</title>
    <meta name="description" content="Get in touch with Havlek. Book a free AI audit or discuss your web, mobile, or e-commerce project. info@havlek.ca — Surrey / Vancouver, BC, Canada.">
    <link rel="canonical" href="https://havlek.ca/contact.html">
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <style>
        * { font-family: 'Inter', sans-serif; }
        .frosted { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); background: rgba(255,255,255,0.72); }
        .fade-in { opacity: 0; transform: translateY(30px); transition: opacity 0.7s ease, transform 0.7s ease; }
        .fade-in.visible { opacity: 1; transform: translateY(0); }
    </style>
    <script>
        tailwind.config = { theme: { extend: { colors: { brand: '#1a73e8' } } } }
    </script>
    <link rel="stylesheet" href="style.css" />
    <!-- Google Analytics -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-D0NJSVQWWE"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
      gtag('config', 'G-D0NJSVQWWE');
    </script>
</head>
<body class="bg-white text-gray-900 antialiased overflow-x-hidden" data-page="contact">

    <div id="site-nav"></div>

    <!-- Hero -->
    <section class="pt-24 pb-12 sm:pt-32 sm:pb-16 bg-gradient-to-b from-gray-50 to-white">
        <div class="max-w-4xl mx-auto px-4 sm:px-6 text-center">
            <h1 class="text-3xl sm:text-4xl md:text-7xl font-bold tracking-tight fade-in">Get in Touch</h1>
            <p class="mt-6 text-xl text-gray-500 fade-in">We'd love to hear about your project.</p>
        </div>
    </section>

    <!-- Contact Section -->
    <section class="py-16 sm:py-24 bg-white">
        <div class="max-w-6xl mx-auto px-4 sm:px-6 grid lg:grid-cols-2 gap-16">

            <!-- Contact Info -->
            <div class="fade-in">
                <h2 class="text-3xl font-bold">Contact Information</h2>
                <div class="mt-10 space-y-8">
                    <div class="flex gap-4">
                        <div class="w-12 h-12 bg-blue-50 rounded-xl flex items-center justify-center text-brand text-xl shrink-0">&#9993;</div>
                        <div>
                            <h4 class="font-semibold">Email</h4>
                            <a href="mailto:info@havlek.ca" class="text-brand hover:underline">info@havlek.ca</a>
                        </div>
                    </div>
                    <div class="flex gap-4">
                        <div class="w-12 h-12 bg-blue-50 rounded-xl flex items-center justify-center text-brand text-xl shrink-0">&#9906;</div>
                        <div>
                            <h4 class="font-semibold">Address</h4>
                            <p class="text-gray-500">#111 16033 108 Ave.<br>PO Box 74057 Fraser Heights PO<br>Surrey, BC, V4N 1P0<br>Canada</p>
                        </div>
                    </div>
                    <div class="flex gap-4">
                        <div class="w-12 h-12 bg-blue-50 rounded-xl flex items-center justify-center text-brand text-xl shrink-0">&#127760;</div>
                        <div>
                            <h4 class="font-semibold">Website</h4>
                            <p class="text-gray-500">havlek.ca</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Contact Form -->
            <div class="fade-in">
                <h2 class="text-3xl font-bold">Send a Message</h2>
                <form id="contactForm" class="mt-10 space-y-6">
                    <input type="hidden" name="from_name" id="hiddenFromName">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Name</label>
                        <input type="text" id="nameInput" name="name" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Email</label>
                        <input type="email" name="from_email" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Subject</label>
                        <input type="text" name="subject" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand transition">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-2">Message</label>
                        <textarea name="message" rows="5" required class="w-full px-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-brand/30 focus:border-brand transition resize-none"></textarea>
                    </div>
                    <button type="submit" id="submitBtn" class="w-full sm:w-auto px-8 py-3 sm:py-4 bg-brand text-white rounded-full text-sm font-semibold hover:bg-blue-700 transition">Send Message</button>
                    <p id="formStatus" class="text-center text-sm hidden"></p>
                </form>
            </div>

        </div>
    </section>

    <div id="site-footer"></div>

    <script src="components.js"></script>
    <script>
        // Scroll animations
        const observer = new IntersectionObserver((entries) => {
            entries.forEach(e => { if (e.isIntersecting) e.target.classList.add('visible'); });
        }, { threshold: 0.1 });
        document.querySelectorAll('.fade-in').forEach(el => observer.observe(el));

        // EmailJS
        emailjs.init('Sh-wsr8dg-MqFoMLl');

        document.getElementById('contactForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const btn    = document.getElementById('submitBtn');
            const status = document.getElementById('formStatus');
            btn.disabled    = true;
            btn.textContent = 'Sending...';

            // Use getElementById to avoid form.name property ambiguity
            document.getElementById('hiddenFromName').value = document.getElementById('nameInput').value;

            emailjs.sendForm('service_3kteq44', 'template_2cmuu07', this)
                .then(() => {
                    status.textContent = 'Message sent successfully!';
                    status.className   = 'text-center text-sm text-green-600';
                    status.classList.remove('hidden');
                    btn.textContent = 'Send Message';
                    btn.disabled    = false;
                    this.reset();
                })
                .catch((err) => {
                    console.error('EmailJS error:', err);
                    status.textContent = 'Something went wrong. Please email us directly at info@havlek.ca';
                    status.className   = 'text-center text-sm text-red-600';
                    status.classList.remove('hidden');
                    btn.textContent = 'Send Message';
                    btn.disabled    = false;
                });
        });
    </script>
</body>
</html>
